name: Feature request
description: Propose a focused improvement to FableCodex.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need is not covered today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Add examples, current behavior, or links to official sources if the request depends on current provider behavior.
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not claim to reproduce Fable 5 model capability.
          required: true
        - label: This does not require committing credentials or private prompt text.
          required: true
